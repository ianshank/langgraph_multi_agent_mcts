# Epic 4.1: CI/CD Pipeline
# Part of Milestone 4: Deployment Readiness

epic:
  id: E4.1
  name: CI/CD Pipeline
  milestone: M4
  status: completed
  owner: orchestrator

stories:
  - id: S4.1.1
    name: Setup GitHub Actions CI
    status: completed
    subagent: orchestrator
    description: |
      Configure GitHub Actions for automated testing, linting,
      and deployment on PRs and pushes.
    acceptance_criteria:
      - PRs automatically tested
      - Linting and type checking in CI
      - Coverage reports generated
      - Badge updates on main branch
    definition_of_done:
      - .github/workflows/ci.yaml configured
      - All checks passing
      - Branch protection rules set
    artifacts:
      - .github/workflows/ci.yaml
      - .github/workflows/deploy.yaml

  - id: S4.1.2
    name: Configure Test Matrix
    status: completed
    subagent: sge
    description: |
      Setup test matrix for multiple Python versions and
      dependency combinations.
    acceptance_criteria:
      - Python 3.11+ tested
      - Dev and neural extras tested separately
      - Test results aggregated
      - Failures block merge
    definition_of_done:
      - Matrix configuration in CI
      - All matrix combinations passing
      - Clear failure reporting
    artifacts:
      - .github/workflows/ci.yaml (matrix section)

  - id: S4.1.3
    name: Setup Deployment Pipeline
    status: completed
    subagent: orchestrator
    description: |
      Configure automated deployment to staging on merge to main.
    acceptance_criteria:
      - Automated deployment on merge
      - Environment-specific configurations
      - Rollback capability
      - Deployment notifications
    definition_of_done:
      - Deploy workflow functional
      - Staging environment configured
      - Deployment documented
    artifacts:
      - .github/workflows/deploy.yaml
      - docs/DEPLOYMENT_REPORT.md
      - docs/DEPLOYMENT_SUMMARY.md

dependencies:
  - E3.1  # Code review must pass

ci_checks:
  - name: lint
    command: ruff check src/ tests/
  - name: format
    command: black --check src/ tests/
  - name: typecheck
    command: mypy src/
  - name: test-unit
    command: pytest tests/unit -v
  - name: test-integration
    command: pytest tests/integration -v
  - name: coverage
    command: pytest --cov=src --cov-report=xml
